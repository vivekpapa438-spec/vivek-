<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
   <input type="text" id="hello">
<h1 id="output"></h1>

<script>
let sajan = document.getElementById("hello");
let ajan = document.getElementById("output");

sajan.addEventListener("input", () => {
    let text = sajan.value;
    let result = "";

    for (let i = 1; i <= 10; i++) {
        result += text + "<br>";
    }

    ajan.innerHTML = result;
});
</script>





    </script>
</body>
</html>
